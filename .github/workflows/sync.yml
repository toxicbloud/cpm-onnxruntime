name: Sync ONNX Runtime Releases

on:
  schedule:
    - cron: '0 0 * * *' # Vérification quotidienne à minuit
  workflow_dispatch: # Permet de lancer la synchro manuellement

permissions:
  contents: write

jobs:
  sync-releases:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Sync All Missing Releases
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # 1. Utiliser gh cli pour lister jusqu'à 200 releases (sans les betas/drafts) de manière robuste en JSON
          RELEASES=$(gh release list -R microsoft/onnxruntime --exclude-pre-releases --exclude-drafts --limit 200 --json tagName -q ".[].tagName" | grep -E '^v[0-9]+\.[0-9]+\.[0-9]+$')

          # 2. Inverser la liste pour traiter de la plus vieille à la plus récente
          RELEASES=$(echo "$RELEASES" | tac)

          # 3. Boucler sur chaque version
          for TAG in $RELEASES; do
            VERSION=${TAG#v}

            # Vérifier si le tag existe déjà sur origin
            if git ls-remote --tags origin refs/tags/$TAG | grep -q "$TAG"; then
              echo "✅ Le tag $TAG existe déjà, on passe."
            else
              echo "🚀 Création du tag $TAG (version $VERSION)..."

              # Revenir sur main et pull au cas où
              git checkout main
              git pull origin main

              # Mettre à jour la version dans le CMakeLists.txt
              sed -i -E "s/set\(ORT_VERSION \".*\"\)/set\(ORT_VERSION \"$VERSION\"\)/" CMakeLists.txt

              # Commit sur main
              git add CMakeLists.txt
              git commit -m "Auto-update to ONNX Runtime $VERSION"
              git push origin main

              # Création et push du tag
              git tag $TAG
              git push origin $TAG

              # Création de la release GitHub via l'outil officiel (gh cli)
              gh release create $TAG --title "Release $TAG" --notes "Automated mirror release for ONNX Runtime $TAG"
              
              # Petite pause pour éviter de spammer l'API GitHub et de se faire bloquer
              sleep 2
            fi
          done